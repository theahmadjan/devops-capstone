name: CI/CD
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest
      - name: Run Tests
        run: pytest api/tests
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flask-api:${{ github.sha }}
      - name: Deploy to Minikube Cluster
        run: |
          # Recreate your cluster environment credentials inside the runner
          echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig
          export KUBECONFIG=kubeconfig
          # Force the deployment to use the newly created Docker Hub image tag
          kubectl set image deployment/flask-api flask-api=${{ secrets.DOCKERHUB_USERNAME }}/flask-api:${{ github.sha }}
