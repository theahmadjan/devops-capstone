name: CI/CD
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests
        run: |
          pip install -r api/requirements.txt
          pip install pytest
          pytest api/tests
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flask-api:${{ github.sha }}
      - name: Deploy to Minikube Cluster
        run: |
          kubectl set image deployment/flask-api flask-api=${{ secrets.DOCKERHUB_USERNAME }}/flask-api:${{ github.sha }}
