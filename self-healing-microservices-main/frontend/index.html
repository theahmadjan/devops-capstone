<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Self-Healing Microservices</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2rem;
      color: #4fc3f7;
    }

    header p {
      color: #888;
      margin-top: 8px;
    }

    .status-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }

    .status-dot.online { background: #66bb6a; box-shadow: 0 0 8px #66bb6a; }
    .status-dot.offline { background: #ef5350; box-shadow: 0 0 8px #ef5350; }

    .status-text { font-size: 0.95rem; color: #aaa; }

    .container {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2a2d3e;
      border-radius: 12px;
      padding: 24px;
    }

    .card h2 {
      font-size: 1.1rem;
      color: #90caf9;
      margin-bottom: 16px;
    }

    .form-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #3a3d4e;
      background: #12141f;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #4fc3f7;
    }

    button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: #4fc3f7;
      color: #0f1117;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    button:hover { background: #81d4fa; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }

    .items-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 60px;
    }

    .item-badge {
      background: #12141f;
      border: 1px solid #2a2d3e;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      color: #ccc;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .item-badge::before {
      content: '▸';
      color: #4fc3f7;
    }

    .empty {
      color: #555;
      font-size: 0.9rem;
      text-align: center;
      padding: 20px;
    }

    .message {
      font-size: 0.85rem;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      display: none;
    }

    .message.success { background: #1b3a1f; color: #66bb6a; display: block; }
    .message.error   { background: #3a1b1b; color: #ef5350; display: block; }

    .refresh-btn {
      background: #2a2d3e;
      color: #90caf9;
      font-size: 0.85rem;
      padding: 6px 14px;
      float: right;
      margin-top: -36px;
    }

    .refresh-btn:hover { background: #3a3d4e; }
  </style>
</head>
<body>

<header>
  <h1>🛠 Self-Healing Microservices</h1>
  <p>BNU DevOps Capstone Project</p>
</header>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span class="status-text" id="statusText">Checking API status...</span>
</div>

<div class="container">

  <!-- Add Item -->
  <div class="card">
    <h2>➕ Add New Item</h2>
    <div class="form-row">
      <input type="text" id="itemInput" placeholder="Enter item name..." />
      <button id="addBtn" onclick="addItem()">Add</button>
    </div>
    <div class="message" id="addMessage"></div>
  </div>

  <!-- Items List -->
  <div class="card">
    <h2>📦 Items in Database</h2>
    <button class="refresh-btn" onclick="loadItems()">↻ Refresh</button>
    <div class="items-list" id="itemsList">
      <div class="empty">Loading...</div>
    </div>
  </div>

</div>

<script>
  const API = 'http://localhost:5000';

  // Check API health on load
  async function checkHealth() {
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    try {
      const res = await fetch(`${API}/health`);
      const data = await res.json();
      if (data.status === 'ok') {
        dot.className = 'status-dot online';
        text.textContent = 'API is online ✓';
      } else {
        throw new Error();
      }
    } catch {
      dot.className = 'status-dot offline';
      text.textContent = 'API is offline — is the container running?';
    }
  }

  // Load all items from MongoDB via the API
  async function loadItems() {
    const list = document.getElementById('itemsList');
    list.innerHTML = '<div class="empty">Loading...</div>';
    try {
      const res = await fetch(`${API}/api/items`);
      const items = await res.json();
      if (items.length === 0) {
        list.innerHTML = '<div class="empty">No items yet — add one above.</div>';
      } else {
        list.innerHTML = items
          .map(i => `<div class="item-badge">${i.name}</div>`)
          .join('');
      }
    } catch {
      list.innerHTML = '<div class="empty" style="color:#ef5350">Could not reach API.</div>';
    }
  }

  // Add a new item
  async function addItem() {
    const input = document.getElementById('itemInput');
    const msg = document.getElementById('addMessage');
    const btn = document.getElementById('addBtn');
    const name = input.value.trim();

    if (!name) {
      msg.className = 'message error';
      msg.textContent = 'Please enter an item name.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Adding...';

    try {
      const res = await fetch(`${API}/api/items`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      const data = await res.json();
      msg.className = 'message success';
      msg.textContent = `✓ "${name}" added successfully.`;
      input.value = '';
      loadItems();
    } catch {
      msg.className = 'message error';
      msg.textContent = 'Failed to add item — API unreachable.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add';
    }
  }

  // Allow pressing Enter in the input field
  document.getElementById('itemInput')
    .addEventListener('keypress', e => { if (e.key === 'Enter') addItem(); });

  // Run on page load
  checkHealth();
  loadItems();

  // Auto-refresh health check every 10 seconds
  setInterval(checkHealth, 10000);
</script>

</body>
</html>
